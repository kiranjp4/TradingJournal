<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal - KJP</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <main class="nature-only" aria-label="Nature background">
      <section class="home-right-login" aria-label="Login panel">
        <h1>Welcome to Trading Journal - KJP</h1>
        <p>Sign in to continue your trading journal.</p>
        <form class="soft-login-form">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" autocomplete="email" />
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button class="button button-primary" type="button">Login</button>
        </form>
      </section>
    </main>
  </body>
</html>
