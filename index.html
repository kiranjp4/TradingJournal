<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal - KJP</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <main class="nature-only" aria-label="Nature background">
      <div id="home-signout" class="home-signout-corner"></div>
      <section class="home-center-login" aria-label="Login panel">
        <div id="auth-root" data-auth-mode="home"></div>
      </section>
      <section id="pages-panel" class="home-pages hidden" aria-label="Your pages">
        <section id="stats-root" class="stats-grid"></section>
        <section id="cards-root" class="cards-grid"></section>
        <p class="home-updated">Last updated: <span id="last-updated">Not loaded</span></p>
      </section>
    </main>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/config.js"></script>
    <script src="js/googledrive.js"></script>
    <script src="js/app.js"></script>
    <script>
      TradingJournal.initHomePage();
    </script>
  </body>
</html>
