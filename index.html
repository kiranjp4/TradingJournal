<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal - KJP</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <header class="site-header">
      <div class="container">
        <div class="brand">
          <strong>Trading Journal - KJP</strong>
          <span>Edit anywhere with Google Drive cloud storage</span>
        </div>
        <nav class="nav-links">
          <a href="index.html" class="active">Home</a>
          <a href="pages/trade-journal.html">Trade Journal</a>
          <a href="pages/net-pnl-jp.html">Net P&L Jp</a>
          <a href="pages/quarterly-result.html">Quarterly</a>
        </nav>
      </div>
    </header>

    <main class="container home-stage">
      <section class="home-scene" aria-label="Nature home background">
        <div class="home-overlay">
          <h1>Welcome to Trading Journal - KJP</h1>
          <p>Login to view and continue your trading journal pages.</p>
          <form class="login-box">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="Enter your email" autocomplete="email" />
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password" />
            <button class="button button-primary" type="button">Login</button>
            <small>Google login is also available below.</small>
          </form>
          <div id="auth-root"></div>
        </div>
      </section>
    </main>

    <footer class="footer container">
      <p>Trading Journal - KJP | Google Drive Cloud + GitHub Pages</p>
    </footer>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/config.js"></script>
    <script src="js/googledrive.js"></script>
    <script src="js/app.js"></script>
    <script>
      TradingJournal.initHomePage();
    </script>
  </body>
</html>
