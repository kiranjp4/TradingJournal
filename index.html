<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal - KJP</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <main class="nature-only" aria-label="Nature background">
      <section class="home-right-login" aria-label="Login panel">
        <h1>Welcome to Trading Journal - KJP</h1>
        <p>Sign in with Google to save all sheet changes to your cloud data.</p>
        <div id="auth-root"></div>
      </section>
    </main>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/config.js"></script>
    <script src="js/googledrive.js"></script>
    <script>
      (async () => {
        if (!window.GoogleDriveSync) return;
        await GoogleDriveSync.initialize();
        GoogleDriveSync.renderAuthUI(document.getElementById("auth-root"));
      })();
    </script>
  </body>
</html>
